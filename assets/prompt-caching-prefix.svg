<svg width="720" height="454" viewBox="0 0 720 454" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="720" height="454" rx="6" fill="#F9F9F7"/>


<text x="360" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1E1E1E">Each turn resends the full context, and the unchanged prefix reads from cache</text>


<text x="44" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#757575">Turn 1</text>
<rect x="44" y="68" width="92" height="30" rx="3" fill="#FCEEE0" stroke="#D4A27F" stroke-width="1.25"/>
