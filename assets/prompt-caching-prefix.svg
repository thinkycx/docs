<text x="44" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9E9E9E">Read from cache (entire turn 1 request)</text>
<text x="298" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B0703F">New: written to cache</text>


