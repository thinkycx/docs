<text x="44" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B0703F">First turn: no cache yet, the whole request is processed and written</text>


<text x="44" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#757575">Turn 2</text>
