<text x="660" y="351" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#1E1E1E">Message 4</text>
<text x="44" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B0703F">Changed</text>
<text x="138" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B0703F">Reprocessed: the prefix no longer matches, so even unchanged content is computed and written again</text>


<line x1="44" y1="406" x2="676" y2="406" stroke="#E0E0E0" stroke-width="1"/>
<rect x="44" y="424" width="18" height="18" rx="3" fill="#E8E8E4"/>
