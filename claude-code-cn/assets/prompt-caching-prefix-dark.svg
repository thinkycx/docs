<text x="44" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7A7A7A">Read from cache (entire turn 1 request)</text>
<text x="298" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E0B08A">New: written to cache</text>


