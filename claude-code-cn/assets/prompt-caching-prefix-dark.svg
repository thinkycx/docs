<svg width="720" height="454" viewBox="0 0 720 454" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="720" height="454" rx="6" fill="#1A1A1A"/>


<text x="360" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#F5F5F5">Each turn resends the full context, and the unchanged prefix reads from cache</text>


