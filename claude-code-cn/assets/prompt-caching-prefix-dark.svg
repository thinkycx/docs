<text x="44" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E0B08A">First turn: no cache yet, the whole request is processed and written</text>


<text x="44" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#A0A0A0">Turn 2</text>
<rect x="44" y="156" width="92" height="30" rx="3" fill="#363636"/>
