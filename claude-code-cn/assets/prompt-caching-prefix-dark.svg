<text x="462" y="263" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#F5F5F5">Reply 2</text>
<rect x="496" y="244" width="64" height="30" rx="3" fill="#3D2F1F" stroke="#D4A27F" stroke-width="1.25"/>
